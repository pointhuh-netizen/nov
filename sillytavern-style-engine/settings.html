<!-- settings.html — ST 확장 설정 패널 삽입 HTML -->
<div id="style-engine-settings" class="se-settings-panel">
    <div class="se-settings-header">
        <span class="se-settings-icon">✍️</span>
        <span class="se-settings-title">Style Engine — 문체 조합 빌더</span>
    </div>
    <div class="se-settings-body">
        <div class="se-settings-current">
            <div class="se-settings-label">현재 적용된 빌드</div>
            <div id="style-engine-current-build" class="se-settings-build-summary">적용된 빌드 없음</div>
        </div>
        <div class="se-settings-actions">
            <button id="style-engine-open-btn" class="se-btn se-btn-primary">
                ✍️ 문체 빌더 열기
            </button>
            <button id="style-engine-clear-btn" class="se-btn se-btn-secondary" disabled>
                🗑️ 빌드 초기화
            </button>
        </div>
    </div>
</div>
